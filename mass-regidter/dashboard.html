<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Mass Register</title>

<link rel="stylesheet" href="css/dashboard.css">

<link rel="stylesheet" href="css/modal.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-church"></i>
<h2>Mass Register</h2>
</div>

<div class="user">

<span id="welcomeName">Welcome</span>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</header>

<section class="cards">

<div class="card">

<i class="fa-solid fa-book-open"></i>

<h3>Received</h3>

<h1 id="receivedCount">0</h1>

</div>

<div class="card">

<i class="fa-solid fa-circle-check"></i>

<h3>Celebrated</h3>

<h1 id="completedCount">0</h1>

</div>

<div class="card">

<i class="fa-solid fa-hourglass-half"></i>

<h3>Remaining</h3>

<h1 id="remainingCount">0</h1>

</div>

</section>

<section class="year">

<select id="yearSelect">

<option>2026</option>

</select>

<button id="addYearBtn">

<i class="fa-solid fa-plus"></i>

Add Year

</button>

</section>

<section class="months">

<div class="month-card">January</div>
<div class="month-card">February</div>
<div class="month-card">March</div>
<div class="month-card">April</div>
<div class="month-card">May</div>
<div class="month-card">June</div>
<div class="month-card">July</div>
<div class="month-card">August</div>
<div class="month-card">September</div>
<div class="month-card">October</div>
<div class="month-card">November</div>
<div class="month-card">December</div>

</section>

<!-- Mass Entry Modal -->

<div id="massModal" class="modal">

<div class="modal-content">

<div class="modal-header">

<h2 id="modalTitle">

✝ Add Mass Entry

</h2>

<span id="closeModal">&times;</span>

</div>

<div class="modal-body">

<div class="input-group">

<label>Date</label>

<input type="date" id="massDate">

</div>

<div class="input-group">

<label>Mass Type</label>

<select id="massType">

<option>Living Intention</option>

<option>Deceased Intention</option>

<option>Rasaa</option>

<option>Thanksgiving</option>

<option>Special Intention</option>

<option>Other</option>

</select>

</div>

<div class="input-group">

<label>Remark</label>

<textarea
id="remark"
rows="4"
placeholder="Enter remark..."></textarea>

</div>

<label class="check">

<input
type="checkbox"
id="celebrated">

Celebrated

</label>

<div class="buttons">

<button id="cancelBtn">

Cancel

</button>

<button id="saveBtn" type="button">
    Save
</button>

</div>

</div>

</div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/modal.js"></script>

</body>

</html>
